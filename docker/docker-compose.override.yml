services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_storage:/root/.ollama
    restart: always

  ollama-gpu:
    extends: ollama
    container_name: ollama-gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles:
      - gpu

  picoclaw-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent-extended
    image: picoclaw-extended:latest
    depends_on:
      - ollama

  picoclaw-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent-extended
    image: picoclaw-extended:latest
    environment:
      - HOME=/root
      - PICOCLAW_HOME=/root/.picoclaw
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    depends_on:
      - ollama

volumes:
  ollama_storage:
